<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal - Firebase</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background:#0a0c0f; color:#e0e0e0; padding:20px; }
        .container { max-width:1400px; margin:0 auto; }
        .header { background:#1e2329; border-radius:20px; padding:25px; margin-bottom:25px; }
        h1 { color:#00ff9d; margin-bottom:20px; }
        .btn { background:#2c3035; color:#00ff9d; border:1px solid #00ff9d; padding:12px 25px; border-radius:8px; cursor:pointer; }
        .btn:hover { background:#00ff9d; color:#0a0c0f; }
        .tabs { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
        .tab { background:#1e2329; color:#a0a0a0; padding:12px 25px; border-radius:10px; cursor:pointer; }
        .tab.active { background:#00ff9d; color:#0a0c0f; }
        .panel { display:none; }
        .panel.active { display:block; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; margin-bottom:25px; }
        .stat-card { background:#1e2329; border-radius:15px; padding:20px; border-left:4px solid #00ff9d; }
        .stat-title { color:#a0a0a0; font-size:14px; text-transform:uppercase; }
        .stat-value { font-size:28px; font-weight:700; color:#00ff9d; }
        .stat-positive { color:#00ff9d; }
        .stat-negative { color:#ff4d4d; }
        .charts-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-bottom:25px; }
        .chart-card { background:#1e2329; border-radius:15px; padding:20px; border:1px solid #2c3035; }
        .chart-container { height:300px; }
        table { width:100%; border-collapse:collapse; background:#1e2329; }
        th { background:#0f1115; color:#00ff9d; padding:12px; text-align:left; }
        td { padding:10px; border-bottom:1px solid #2c3035; }
        .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:20px; background:#1e2329; padding:20px; border-radius:15px; }
        .form-group { display:flex; flex-direction:column; }
        input, select { background:#1e2329; border:1px solid #2c3035; color:#00ff9d; padding:12px; border-radius:8px; }
        .table-scroll { max-height:600px; overflow-y:auto; border:1px solid #2c3035; border-radius:8px; }
        @media (max-width:768px) { .charts-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 TRADING JOURNAL - FIREBASE</h1>
        <div style="display:flex; gap:20px; align-items:center; flex-wrap:wrap;">
            <label for="fileInput" class="btn">📁 Importar CSV</label>
            <input type="file" id="fileInput" accept=".csv" style="display:none;">
            <button class="btn" onclick="exportToCSV()">💾 Exportar CSV</button>
            <button class="btn" onclick="clearAllData()">🗑️ Limpiar</button>
            <select id="accountSelect" style="background:#1e2329; color:#00ff9d; padding:12px; border-radius:8px;">
                <option value="Apex">Apex</option>
                <option value="FP-Markets-Raw">FP Markets</option>
                <option value="Quantfury">Quantfury</option>
                <option value="Lucid">Lucid</option>
            </select>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('dashboard')">📈 Dashboard</div>
        <div class="tab" onclick="showTab('manual')">✍️ Manual</div>
        <div class="tab" onclick="showTab('metrics')">📊 Métricas</div>
    </div>

    <!-- Dashboard -->
    <div id="panel-dashboard" class="panel active">
        <div class="stats-grid" id="statsDashboard"></div>
        <div class="charts-grid">
            <div class="chart-card"><h3>💰 Equity</h3><div class="chart-container"><canvas id="equityChart"></canvas></div></div>
            <div class="chart-card"><h3>📉 Drawdown</h3><div class="chart-container"><canvas id="drawdownChart"></canvas></div></div>
        </div>
    </div>

    <!-- Manual -->
    <div id="panel-manual" class="panel">
        <div class="form-grid">
            <h3 style="color:#00ff9d; grid-column:1/-1;">✍️ Nueva operación</h3>
            <div class="form-group"><label>Símbolo</label><input id="manualSymbol" value="MNQ"></div>
            <div class="form-group"><label>Cantidad</label><input type="number" id="manualQty" value="1" step="any"></div>
            <div class="form-group"><label>Entrada</label><input type="number" id="manualBuyPrice" value="20000"></div>
            <div class="form-group"><label>Salida</label><input type="number" id="manualSellPrice" value="20100"></div>
            <div class="form-group"><label>Dirección</label>
                <select id="manualDirection"><option value="LONG">LONG</option><option value="SHORT">SHORT</option></select>
            </div>
            <div class="form-group"><label>Fecha</label><input id="manualDate" placeholder="03/08/2026 15:30"></div>
            <button class="btn" onclick="addManualTrade()" style="grid-column:1/-1;">➕ Añadir</button>
        </div>
        <div class="table-card">
            <h3>📋 Operaciones</h3>
            <div class="table-scroll">
                <table><thead><tr><th>Fecha</th><th>Símbolo</th><th>Qty</th><th>Dir</th><th>Entrada</th><th>Salida</th><th>PnL</th></tr></thead>
                <tbody id="allTradesTableBody"></tbody></table>
            </div>
        </div>
    </div>

    <!-- Métricas -->
    <div id="panel-metrics" class="panel">
        <div class="stats-grid" id="metricsStats"></div>
    </div>
</div>

<script>
// Config Firebase
const firebaseConfig = {
    apiKey: "AIzaSyBw4QzD5eZThBam9Ph-lHRrSLRjBGHZFyQ",
    authDomain: "trading-journal-be871.firebaseapp.com",
    projectId: "trading-journal-be871",
    storageBucket: "trading-journal-be871.firebasestorage.app",
    messagingSenderId: "751127784795",
    appId: "1:751127784795:web:3713bca81f8ef9d3353e7e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let trades = [];

// Cargar trades
async function cargarTrades() {
    try {
        const snapshot = await db.collection('trades').orderBy('fecha', 'desc').get();
        trades = [];
        snapshot.forEach(doc => {
            const t = doc.data();
            t.id = doc.id;
            t.bought = t.fecha?.toDate ? t.fecha.toDate() : new Date();
            trades.push(t);
        });
        actualizarDashboard();
        actualizarTabla();
    } catch(e) { console.error(e); }
}

// Guardar trade
async function guardarTrade(trade) {
    try {
        await db.collection('trades').add(trade);
        await cargarTrades();
    } catch(e) { console.error(e); }
}

// Añadir manual
async function addManualTrade() {
    const symbol = document.getElementById('manualSymbol').value;
    const qty = parseFloat(document.getElementById('manualQty').value);
    const buy = parseFloat(document.getElementById('manualBuyPrice').value);
    const sell = parseFloat(document.getElementById('manualSellPrice').value);
    const dir = document.getElementById('manualDirection').value;
    const dateStr = document.getElementById('manualDate').value;

    if(!symbol || !qty || !buy || !sell) return alert('Completa campos');

    const pnl = dir === 'LONG' ? (sell - buy) * qty : (buy - sell) * qty;
    let fecha = new Date();
    if(dateStr) {
        const [dp, tp] = dateStr.split(' ');
        if(dp && tp) {
            const [m,d,y] = dp.split('/');
            fecha = new Date(`${y}-${m}-${d}T${tp}:00`);
        }
    }

    await guardarTrade({
        fecha, symbol, qty, direction: dir,
        buyPrice: buy, sellPrice: sell, pnl,
        account: document.getElementById('accountSelect').value
    });
}

// Actualizar tabla
function actualizarTabla() {
    let html = '';
    trades.slice(0,50).forEach(t => {
        html += `<tr>
            <td>${t.fecha?.toDate().toLocaleString() || ''}</td>
            <td>${t.symbol}</td>
            <td>${t.qty}</td>
            <td>${t.direction}</td>
            <td>$${t.buyPrice?.toFixed(2)}</td>
            <td>$${t.sellPrice?.toFixed(2)}</td>
            <td class="${t.pnl>=0?'stat-positive':'stat-negative'}">$${t.pnl?.toFixed(2)}</td>
        </tr>`;
    });
    document.getElementById('allTradesTableBody').innerHTML = html || '<tr><td colspan="7">No hay trades</td></tr>';
}

// Dashboard
function actualizarDashboard() {
    if(!trades.length) {
        document.getElementById('statsDashboard').innerHTML = '<div class="stat-card">No hay operaciones</div>';
        return;
    }
    const total = trades.length;
    const wins = trades.filter(t => t.pnl > 0).length;
    const pnlTotal = trades.reduce((s,t) => s + (t.pnl || 0), 0);
    document.getElementById('statsDashboard').innerHTML = `
        <div class="stat-card"><div class="stat-title">Total</div><div class="stat-value">${total}</div></div>
        <div class="stat-card"><div class="stat-title">Winrate</div><div class="stat-value">${(wins/total*100).toFixed(1)}%</div></div>
        <div class="stat-card"><div class="stat-title">PnL</div><div class="stat-value ${pnlTotal>=0?'stat-positive':'stat-negative'}">$${pnlTotal.toFixed(2)}</div></div>
    `;
}

// Exportar CSV
function exportToCSV() {
    if(!trades.length) return alert('No hay datos');
    let csv = 'Fecha,Símbolo,Cantidad,Dirección,Entrada,Salida,PnL\n';
    trades.forEach(t => {
        const f = t.fecha?.toDate().toLocaleString() || '';
        csv += `${f},${t.symbol},${t.qty},${t.direction},${t.buyPrice},${t.sellPrice},${t.pnl}\n`;
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = 'trades.csv';
    a.click();
}

// Limpiar (desactivado por seguridad)
async function clearAllData() { alert('Función desactivada'); }

// Tabs
function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
}

// Inicio
cargarTrades();
</script>
</body>
</html>
